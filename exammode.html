<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exam Mode | GOLD RADIOLOGY</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo">GOLD RADIOLOGY</a>
    <nav>
      <a href="qbank.html">Qbank</a>
      <a href="progress.html">Progress</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <section class="study-mode-container">
      <aside class="questions-sidebar" id="questions-sidebar" aria-label="Question navigation">
        <div class="sidebar-title">Questions</div>
        <div class="questions-list" id="questions-list"></div>
      </aside>

      <div class="question-content">
        <div class="question-container">
          <div class="question-header" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
            <div style="display: flex; align-items: center; gap: 15px;">
              <div class="question-number" id="question-number" style="margin: 0;">Question 1</div>
              <button id="flag-question-btn" class="flag-btn" style="padding: 6px 12px; cursor: pointer; border-radius: 6px; border: 1px solid #ffbc00; background: transparent; color: #ffbc00; font-weight: bold; transition: all 0.2s;">🏳️ Flag Question</button>
            </div>
            <div class="question-counter" id="question-counter">Question 1 of 1</div>
          </div>

          <div class="question-text" id="question-text"></div>
          <div class="choices-container" id="choices-container"></div>
        </div>

        <div class="navigation-buttons">
          <button class="nav-btn" id="prev-btn">Previous</button>
          <button class="nav-btn" id="next-btn">Next</button>
          <button class="nav-btn end-test-btn" id="end-test-btn">End Test</button>
        </div>
      </div>
    </section>
  </main>

  <div class="exam-floating-tab" id="exam-floating-tab" aria-live="polite">
    <div class="exam-timer">
      <span>Time:</span>
      <span id="timer">00:00</span>
    </div>
    <div class="exam-question-progress" id="exam-question-progress">
      <span id="exam-current-question">1</span> / <span id="exam-total-questions">—</span>
    </div>
  </div>

  <footer>
    <p>© 2026 GOLD RADIOLOGY. All rights reserved.</p>
  </footer>

  <script src="exammode.js"></script>
</body>
</html>
